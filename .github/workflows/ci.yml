name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.6'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@4977418856133491c6aa7407d40668744df21818
      - name: Install mold linker
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          # mold accelerates dev builds; coverage uses lld for llvm-tools compatibility.
          sudo apt-get update \
            && sudo apt-get install --yes --no-install-recommends clang lld mold
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@f163ced3abde29b6cd0890bb8e9307c9483b5dc9
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Setup uv
        uses: astral-sh/setup-uv@ecd24dd710f2fb0dca1693a67af11fc4a5c5ec84
        with:
          python-version: '3.14'
      - name: Spelling
        run: make spelling
      - name: Install test runner
        env:
          RUSTFLAGS: ""
        run: cargo binstall --no-confirm cargo-nextest
      # Dependency audits report advisories against the whole lockfile, so a
      # newly published advisory would fail every Dependabot PR regardless of
      # content and deadlock auto-merge. The scheduled audit workflow covers
      # Dependabot merges instead.
      - name: Install cargo-audit
        if: github.actor != 'dependabot[bot]'
        env:
          RUSTFLAGS: ""
        run: cargo binstall --no-confirm cargo-audit
      - name: Setup Python for audit manifest extraction
        if: github.actor != 'dependabot[bot]'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Cache Whitaker installer
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        env:
          RUSTFLAGS: ""
        run: |
          set -euo pipefail
          if command -v whitaker-installer >/dev/null 2>&1; then
            echo "whitaker-installer already present; skipping cargo binstall"
          else
            cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
          fi
          # --cranelift provisions rustc-codegen-cranelift on Whitaker's pinned
          # toolchain; this project builds with the Cranelift debug backend.

          whitaker-installer --cranelift
      - name: Audit dependencies
        if: github.actor != 'dependabot[bot]'
        run: make audit
      - name: Lint
        run: make lint
      - name: Log coverage linker configuration
        run: |
          echo "Coverage linker: clang"
          echo "Coverage RUSTFLAGS: -C link-arg=-fuse-ld=lld"
          echo "Coverage CFLAGS: -fuse-ld=lld"
          echo "Coverage LDFLAGS: -fuse-ld=lld"
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@d28e04c9ea359650a85d697d1ab3d0be0b5674e7
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          RUSTFLAGS: -C link-arg=-fuse-ld=lld
          CFLAGS: -fuse-ld=lld
          LDFLAGS: -fuse-ld=lld
        with:
          output-path: lcov.info
          format: lcov
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@7da7c6d89033d13cbb1c64803d108ddca97e69c2
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
